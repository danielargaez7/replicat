replicaCount: 1

image:
  repository: registry.bundlescope.io/operator
  tag: "0.1.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: bundlescope-operator

namespace: bundlescope-system

# Backend connection (outbound only)
backend:
  url: ""
  # API key for authenticating with Bundlescope backend
  apiKey: ""

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi
