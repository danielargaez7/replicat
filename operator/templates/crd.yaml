apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: bundlescoperemediations.bundlescope.io
spec:
  group: bundlescope.io
  names:
    kind: BundlescopeRemediation
    plural: bundlescoperemediations
    singular: bundlescoperemediation
    shortNames:
      - bsr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - analysisId
                - remediationId
                - commands
              properties:
                analysisId:
                  type: string
                remediationId:
                  type: string
                commands:
                  type: array
                  items:
                    type: object
                    properties:
                      command:
                        type: string
                      description:
                        type: string
                rollbackCommands:
                  type: array
                  items:
                    type: object
                    properties:
                      command:
                        type: string
                      description:
                        type: string
                approved:
                  type: boolean
                  default: false
                autoApply:
                  type: boolean
                  default: false
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Approved
                    - Applying
                    - Applied
                    - Failed
                    - RolledBack
                message:
                  type: string
                appliedAt:
                  type: string
                  format: date-time
                output:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Analysis
          type: string
          jsonPath: .spec.analysisId
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
