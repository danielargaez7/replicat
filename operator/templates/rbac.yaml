apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bundlescope-operator
  labels:
    app.kubernetes.io/name: bundlescope-operator
rules:
  # Watch and manage BundlescopeRemediation CRDs
  - apiGroups: ["bundlescope.io"]
    resources: ["bundlescoperemediations"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["bundlescope.io"]
    resources: ["bundlescoperemediations/status"]
    verbs: ["update", "patch"]
  # Scoped permissions for remediation actions
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bundlescope-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bundlescope-operator
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
